server:
  port: 8080


spring:
  application:
    name: accounts-ms

  datasource:
    url: jdbc:h2:mem:accounts_db
    driverClassName: org.h2.Driver
    username: sa
    password: ''

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true                                        # Show SQL
    hibernate:
      ddl-auto: update
      #properties:
      #  hibernate:
      #    format_sql: true                                  # Format SQL nicely

  config:
    import: "optional:configserver:http://localhost:8071/"

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true


# To also show bind parameter values
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG                                        # Show SQL
        orm:
          jdbc:
            bind: TRACE                                     # Show bind parameters


management:
  endpoints:
    web:
      exposure:
        include: "refresh, info, shutdown, health, circuitbreakers, circuitbreakerevents"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    shutdown:
      access: unrestricted
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true


eureka:
  instance:
    preferIpAddress: true

  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/


# To display meaning information on the eureka server
info:
  app:
    name: ACCOUNTS_MICROSERVICE
    description: Accounts Micro Service Instance
    version: 1.0.0


# circuit breaker configuration
resilience4j:
  circuitbreaker:
    configs:
      default:                                          # this configuration is applicable to all circuit breakers in this microservice (API Gateway)
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 2
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
