services:

  config-server-service:
    image: "lokeshjavatech/config_server_image:v1"
    container_name: "config-server-container"
    ports:
      - "8071:8071"
    healthcheck:
      test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
      start_period: 50s
      timeout: 50s
      interval: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - "lokesh_network"

  eureka-server-service:
    image: "lokeshjavatech/eureka_server_image:v1"
    container_name: "eureka-server-container"
    ports:
      - "8070:8070"
    depends_on:
      config-server-service:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8070/actuator/health/readiness | grep UP || exit 1"
      start_period: 50s
      timeout: 50s
      interval: 10s
      retries: 10
    environment:
      SPRING_APPLICATION_NAME: "eureka-server-ms"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server-service:8071/"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - "lokesh_network"

  accounts-service:
    image: "lokeshjavatech/accounts_image:v1"
    container_name: "accounts-container"
    ports:
      - "8080:8080"
    depends_on:
      config-server-service:
        condition: service_healthy
      eureka-server-service:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8080/actuator/health/readiness | grep UP || exit 1"
      start_period: 50s
      timeout: 50s
      interval: 10s
      retries: 10
    environment:
      SPRING_APPLICATION_NAME: "accounts-ms"
      SPRING_PROFILES_ACTIVE: "default"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server-service:8071/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server-service:8070/eureka/"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - "lokesh_network"

  loans-service:
    image: "lokeshjavatech/loans_image:v1"
    container_name: "loans-container"
    ports:
      - "8090:8090"
    depends_on:
      config-server-service:
        condition: service_healthy
      eureka-server-service:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8090/actuator/health/readiness | grep UP || exit 1"
      start_period: 50s
      timeout: 50s
      interval: 10s
      retries: 10
    environment:
      SPRING_APPLICATION_NAME: "loans-ms"
      SPRING_PROFILES_ACTIVE: "default"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server-service:8071/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server-service:8070/eureka/"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - "lokesh_network"

  cards-service:
    image: "lokeshjavatech/cards_image:v1"
    container_name: "cards-container"
    ports:
      - "9000:9000"
    depends_on:
      config-server-service:
        condition: service_healthy
      eureka-server-service:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:9000/actuator/health/readiness | grep UP || exit 1"
      start_period: 50s
      timeout: 50s
      interval: 10s
      retries: 10
    environment:
      SPRING_APPLICATION_NAME: "cards-ms"
      SPRING_PROFILES_ACTIVE: "default"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server-service:8071/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server-service:8070/eureka/"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - "lokesh_network"

  api-gateway-service:
    image: "lokeshjavatech/api_gateway_image:v1"
    container_name: "api-gateway-container"
    ports:
      - "8072:8072"
    depends_on:
      accounts-service:
        condition: service_healthy
      loans-service:
        condition: service_healthy
      cards-service:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "api-gateway-ms"
      SPRING_PROFILES_ACTIVE: "default"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server-service:8071/"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eureka-server-service:8070/eureka/"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - "lokesh_network"

networks:
  lokesh_network:
    driver: "bridge"
